name: Release

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - main
      - development
    tags:
      - "*.*.*"
      - "*.*.*-*"
      - "v*.*.*"
      - "v*.*.*-*"
      - "beta"
      - "development"

env:
  REGISTRY: ghcr.io

permissions:
  contents: write
  packages: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.2"

      - name: Show Swift version
        run: swift --version

      - name: Run test suite
        run: swift test

  publish-images:
    name: Publish Docker Image (${{ matrix.product }})
    needs: test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        product:
          - unifi2mqtt
          - unifimqtt2dns

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare image coordinates
        id: image
        run: |
          set -euo pipefail

          owner="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          image="${{ env.REGISTRY }}/${owner}/${{ matrix.product }}"
          prerelease=false
          case "${GITHUB_REF_NAME}" in
            development|*alpha*|*beta*|*gamma*) prerelease=true ;;
          esac

          echo "name=${image}" >> "$GITHUB_OUTPUT"
          echo "prerelease=${prerelease}" >> "$GITHUB_OUTPUT"

      - name: Generate Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=main,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=development,enable=${{ github.ref == 'refs/heads/development' || github.ref == 'refs/tags/development' || contains(github.ref_name, '-development') }}
            type=raw,value=beta,enable=${{ github.ref == 'refs/tags/beta' || contains(github.ref_name, '-beta') }}
            type=semver,pattern={{version}},value=${{ github.ref_name }},enable=${{ startsWith(github.ref, 'refs/tags/') && github.ref_name != 'beta' && github.ref_name != 'development' }}

      - name: Build and publish multi-arch image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./unifi2mqtt.product.dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            PRODUCT=${{ matrix.product }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.product }}
          cache-to: type=gha,mode=max,scope=${{ matrix.product }}

      - name: Write release asset metadata
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          set -euo pipefail

          asset="${{ matrix.product }}-image.txt"
          {
            echo "Image: ${{ steps.image.outputs.name }}"
            echo "Release tag: ${{ github.ref_name }}"
            echo "Digest: ${{ steps.build.outputs.digest }}"
            echo
            echo "Published tags:"
            printf '%s\n' '${{ steps.meta.outputs.tags }}' | sed 's/^/  /'
          } > "${asset}"

      - name: Upload image metadata
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: image-metadata-${{ matrix.product }}
          path: ${{ matrix.product }}-image.txt
          if-no-files-found: error

  release:
    name: Publish Release
    if: startsWith(github.ref, 'refs/tags/')
    needs: publish-images
    runs-on: ubuntu-latest

    steps:
      - name: Download image metadata
        uses: actions/download-artifact@v4
        with:
          pattern: image-metadata-*
          merge-multiple: true

      - name: Generate release image summary
        run: |
          set -euo pipefail
          cat unifi2mqtt-image.txt unifimqtt2dns-image.txt > DOCKER-IMAGES.txt

      - name: Determine prerelease status
        id: release
        run: |
          set -euo pipefail

          prerelease=false
          case "${GITHUB_REF_NAME}" in
            development|*alpha*|*beta*|*gamma*) prerelease=true ;;
          esac

          echo "prerelease=${prerelease}" >> "$GITHUB_OUTPUT"

      - name: Create or update GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          draft: false
          prerelease: ${{ steps.release.outputs.prerelease == 'true' }}
          body_path: DOCKER-IMAGES.txt
          overwrite_files: true
          files: |
            DOCKER-IMAGES.txt
            unifi2mqtt-image.txt
            unifimqtt2dns-image.txt
