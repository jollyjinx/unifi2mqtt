name: Release

on:
  push:
    branches:
      - development
    tags:
      - '*.*.*'
      - '*.*.*-*'

permissions:
  contents: write
  packages: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.2"

      - name: Show Swift version
        run: swift --version

      - name: Run test suite
        run: swift test

  publish-images:
    name: Publish Docker Image (${{ matrix.product }})
    needs: test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        product:
          - unifi2mqtt
          - unifimqtt2dns

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare image coordinates
        id: image
        run: |
          set -euo pipefail

          owner="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          image="ghcr.io/${owner}/${{ matrix.product }}"
          is_prerelease=false
          case "${GITHUB_REF_NAME}" in
            *alpha*|*beta*|*gamma*) is_prerelease=true ;;
          esac

          echo "name=${image}" >> "$GITHUB_OUTPUT"
          echo "is_prerelease=${is_prerelease}" >> "$GITHUB_OUTPUT"

      - name: Generate Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=raw,value=${{ github.ref_name }}
            type=raw,value=latest,enable=${{ steps.image.outputs.is_prerelease != 'true' }}

      - name: Build and publish multi-arch image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./unifi2mqtt.product.dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            PRODUCT=${{ matrix.product }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.product }}
          cache-to: type=gha,mode=max,scope=${{ matrix.product }}

      - name: Write release asset metadata
        run: |
          set -euo pipefail

          asset="${{ matrix.product }}-image.txt"
          {
            echo "Image: ${{ steps.image.outputs.name }}"
            echo "Release tag: ${{ github.ref_name }}"
            echo "Digest: ${{ steps.build.outputs.digest }}"
            echo
            echo "Published tags:"
            echo "  ${{ steps.image.outputs.name }}:${{ github.ref_name }}"
            if [ "${{ steps.image.outputs.is_prerelease }}" != "true" ]; then
              echo "  ${{ steps.image.outputs.name }}:latest"
            fi
            echo
            echo "Pull:"
            echo "  docker pull ${{ steps.image.outputs.name }}:${{ github.ref_name }}"
          } > "${asset}"

      - name: Upload image metadata
        uses: actions/upload-artifact@v4
        with:
          name: image-metadata-${{ matrix.product }}
          path: ${{ matrix.product }}-image.txt
          if-no-files-found: error

  release:
    name: Publish Release
    needs: publish-images
    runs-on: ubuntu-latest

    steps:
      - name: Download image metadata
        uses: actions/download-artifact@v4
        with:
          pattern: image-metadata-*
          merge-multiple: true

      - name: Generate release image summary
        run: |
          set -euo pipefail
          cat unifi2mqtt-image.txt unifimqtt2dns-image.txt > DOCKER-IMAGES.txt

      - name: Create or update GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'gamma') }}
          generate_release_notes: true
          overwrite_files: true
          files: |
            DOCKER-IMAGES.txt
            unifi2mqtt-image.txt
            unifimqtt2dns-image.txt
